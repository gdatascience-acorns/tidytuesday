- file: "palomar_bpt_diagram.png"
  alt: >
    A scatter plot showing the BPT diagnostic diagram for 408 nearby galaxies observed with the Hale Telescope. The x-axis is the log ratio of nitrogen to hydrogen emission lines and the y-axis is the log ratio of oxygen to hydrogen lines. Points are colored by nuclear activity type: blue for star-forming H II regions clustered at lower left, red for Seyfert nuclei at upper right, orange for LINERs at right, and green for transition objects between the groups.
