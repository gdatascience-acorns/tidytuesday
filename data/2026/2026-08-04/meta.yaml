images:
- file: "sample_basotho_wool_2023_primary_value_plot.png"
  alt: >
    A horizontal bar chart titled 'Global Basotho Wool Imports (2023)' displaying the total trade primary value in USD across four importing countries from Lesotho. The countries are listed vertically on the y-axis, ordered from largest value at the top to smallest at the bottom: South Africa ($38M), China ($24M), Uruguay ($215K), and India ($141K). Each country is colored with a unique solid bar, and the exact formatted dollar amounts are labeled in bold next to the right edge of each bar. The x-axis representing total import value is clean with no line or tick marks, letting the data labels communicate the values. A descriptive text caption below notes that the visualization utilizes mirror trade statistics based on UN Comtrade primary value reporting.
